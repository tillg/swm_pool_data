name: Transform Data

on:
  push:
    paths:
      - 'weather_raw/**'
  workflow_call:
  workflow_dispatch:

concurrency:
  group: transform-pipeline
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  transform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: pip install pandas holidays

      - name: Run transform
        working-directory: src
        run: |
          python transform.py \
            --pool-dir ../pool_scrapes_raw \
            --weather-dir ../weather_raw \
            --holiday-dir ../holidays \
            --output ../datasets/occupancy_historical.csv

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datasets/ src/config/
          git diff --staged --quiet && exit 0
          git commit -m "Transform $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, attempt $i. Pulling and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1
