# swm_pool_data/.github/workflows/scrape.yml
name: Scrape Pool Data

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tillg/swm_pool_scraper
          path: scraper

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r scraper/requirements.txt

      - run: python scraper/scrape.py --output-dir pool_scrapes_raw

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pool_scrapes_raw/
          git diff --staged --quiet && exit 0
          git commit -m "Scrape $(date -u +%Y-%m-%d\ %H:%M)"
          # Retry push up to 3 times with pull-rebase on failure
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, attempt $i. Pulling and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1

  transform:
    needs: scrape
    uses: ./.github/workflows/transform.yml
