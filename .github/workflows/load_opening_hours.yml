# swm_pool_data/.github/workflows/load_opening_hours.yml
name: Load Opening Hours

on:
  schedule:
    - cron: "0 2 * * *"   # daily 02:00 UTC (~03:00/04:00 Berlin)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-opening-hours:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tillg/swm_pool_scraper
          path: scraper

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r scraper/requirements.txt

      - run: python scraper/scrape_opening_hours.py --output-dir facility_openings_raw

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facility_openings_raw/
          git diff --staged --quiet && exit 0
          git commit -m "Opening hours $(date -u +%Y-%m-%d)"
          # Retry push up to 3 times with pull-rebase on failure
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, attempt $i. Pulling and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1
