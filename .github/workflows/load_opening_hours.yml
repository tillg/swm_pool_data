# swm_pool_data/.github/workflows/load_opening_hours.yml
name: Load Opening Hours

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  load-opening-hours:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: tillg/swm_pool_scraper
          path: scraper
          token: ${{ secrets.SCRAPER_REPO_TOKEN || github.token }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - run: pip install -r scraper/requirements.txt

      - name: Run deterministic opening-hours scraper
        id: deterministic
        shell: bash
        run: |
          set +e
          python scraper/scrape_opening_hours.py --output-dir facility_openings_raw 2>&1 | tee opening_hours_deterministic.log
          status=${PIPESTATUS[0]}
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Run AI opening-hours fallback
        if: steps.deterministic.outputs.status != '0'
        env:
          AI_OPENAI_BASE_URL: ${{ secrets.AI_OPENAI_BASE_URL }}
          AI_OPENAI_API_KEY: ${{ secrets.AI_OPENAI_API_KEY }}
          AI_OPENAI_MODEL: ${{ vars.AI_OPENAI_MODEL || 'gpt-4.1' }}
          SWM_BASE_URL: ${{ vars.SWM_BASE_URL || 'https://www.swm.de' }}
        run: |
          python src/opening_hours_ai_fallback.py \
            --scraper-dir scraper \
            --output-dir facility_openings_raw \
            --failure-log opening_hours_deterministic.log

      - name: Upload AI fallback debug logs
        if: always() && steps.deterministic.outputs.status != '0'
        uses: actions/upload-artifact@v4
        with:
          name: opening-hours-ai-debug
          path: |
            opening_hours_deterministic.log
            opening_hours_ai_response.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Verify scraper after AI fallback
        if: steps.deterministic.outputs.status != '0'
        run: python scraper/scrape_opening_hours.py --output-dir /tmp/opening-hours-verify

      - name: Commit and push scraper fallback fix
        if: steps.deterministic.outputs.status != '0'
        working-directory: scraper
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet && exit 0
          git commit -m "Fix opening hours scraper from AI fallback"
          git push

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add facility_openings_raw/
          git diff --staged --quiet && exit 0
          git commit -m "Opening hours $(date -u +%Y-%m-%d)"
          # Retry push up to 3 times with pull-rebase on failure
          for i in 1 2 3; do
            git push && exit 0
            echo "Push failed, attempt $i. Pulling and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1
